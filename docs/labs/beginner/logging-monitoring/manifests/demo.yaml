---
# 日志生成器：持续输出日志
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  labels:
    app: log-generator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
      - name: logger
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          i=0
          while true; do
            i=$((i+1))
            echo "[$(date)] INFO: Request #$i processed successfully"
            if [ $((i % 10)) -eq 0 ]; then
              echo "[$(date)] WARN: High latency detected on request #$i"
            fi
            if [ $((i % 50)) -eq 0 ]; then
              echo "[$(date)] ERROR: Connection timeout on request #$i"
            fi
            sleep 2
          done
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
---
# 多容器 Pod 示例
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  labels:
    app: multi-container
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do echo "[app] $(date) processing..."; sleep 3; done']
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
  - name: sidecar
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do echo "[sidecar] $(date) tailing logs..."; sleep 5; done']
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
