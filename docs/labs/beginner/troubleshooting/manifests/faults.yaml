---
# 场景 1：Pending — 请求了不可能满足的资源
apiVersion: v1
kind: Pod
metadata:
  name: pending-pod
spec:
  containers:
  - name: app
    image: nginx:1.27
    resources:
      requests:
        cpu: "100"
        memory: 1000Gi
---
# 场景 2：CrashLoopBackOff — 应用因缺少环境变量退出
apiVersion: v1
kind: Pod
metadata:
  name: crash-pod
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      if [ -z "$DATABASE_URL" ]; then
        echo "FATAL: DATABASE_URL environment variable is not set"
        echo "Cannot start without database connection"
        exit 1
      fi
      echo "Connected to $DATABASE_URL"
      while true; do sleep 3600; done
---
# 场景 3：ImagePullBackOff — 镜像名写错
apiVersion: v1
kind: Pod
metadata:
  name: image-pull-pod
spec:
  containers:
  - name: app
    image: nginxx:latest
