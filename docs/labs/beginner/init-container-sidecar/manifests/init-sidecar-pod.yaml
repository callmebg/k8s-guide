apiVersion: v1
kind: Pod
metadata:
  name: app-with-init-sidecar
  labels:
    app: init-sidecar-demo
spec:
  volumes:
  - name: logs
    emptyDir: {}

  initContainers:
  - name: wait-for-svc
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "Init 1: 等待 kubernetes Service 可达..."
      until nslookup kubernetes.default.svc.cluster.local; do
        echo "  还在等..."
        sleep 2
      done
      echo "✅ kubernetes Service 可达！"

  - name: init-config
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "Init 2: 写入配置文件到共享卷..."
      echo "log_level=debug" > /config/app.conf
      echo "max_connections=100" >> /config/app.conf
      echo "✅ 配置文件写入完成"
      cat /config/app.conf
    volumeMounts:
    - name: logs
      mountPath: /config

  containers:
  - name: app
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: logs
      mountPath: /var/log/nginx

  - name: log-collector
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "Sidecar 启动，开始收集日志..."
      touch /logs/access.log
      tail -f /logs/access.log
    volumeMounts:
    - name: logs
      mountPath: /logs
