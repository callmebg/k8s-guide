---
# Guaranteed: requests = limits
apiVersion: v1
kind: Pod
metadata:
  name: guaranteed
  labels:
    qos-demo: "true"
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do sleep 3600; done']
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 128Mi
---
# Burstable: requests < limits
apiVersion: v1
kind: Pod
metadata:
  name: burstable
  labels:
    qos-demo: "true"
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do sleep 3600; done']
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
---
# BestEffort: no requests, no limits
apiVersion: v1
kind: Pod
metadata:
  name: besteffort
  labels:
    qos-demo: "true"
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do sleep 3600; done']
