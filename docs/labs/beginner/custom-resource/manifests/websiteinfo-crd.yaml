apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: websiteinfos.example.com
spec:
  group: example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              url:
                type: string
              maintainer:
                type: string
              replicas:
                type: integer
                minimum: 1
                maximum: 10
            required: ["url"]
  scope: Namespaced
  names:
    plural: websiteinfos
    singular: websiteinfo
    kind: WebsiteInfo
    shortNames:
    - wi
