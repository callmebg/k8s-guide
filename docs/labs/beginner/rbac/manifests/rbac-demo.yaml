---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-sa
  namespace: dev
---
# Role: 只能读取 Pod 和 Service
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
# RoleBinding: 把 pod-reader 权限绑定给 readonly-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: readonly-sa
  namespace: dev
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
